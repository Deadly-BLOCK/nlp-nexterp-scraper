name: Scrape & Publish per-student
on:
  workflow_dispatch:
    inputs:
      student_code:
        description: 'Unique login code for the student'
        required: true

concurrency:
  group: scrape-publish
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 👷 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Fetch credentials
        env:
          DECRYPT_PSSWD: ${{ secrets.DECRYPT_CREDSJSON }}
        run: |
          curl -s "https://rijash.com/nlp/creds.json.enc" > raw_creds.json
          openssl enc -aes-256-cbc -d -pbkdf2 -iter 100000 -md sha256 \
            -in raw_creds.json -out decrypted_creds.json -pass env:DECRYPT_PSSWD
          mv decrypted_creds.json raw_creds.json
          STUDENT="${{ github.event.inputs.student_code }}"
          USERNAME=$(jq -r --arg s "$STUDENT" '.[] | select(.student_code == $s) | .u' raw_creds.json)
          PASSWORD=$(jq -r --arg s "$STUDENT" '.[] | select(.student_code == $s) | .p' raw_creds.json)
          TWOFA=$(jq -r --arg s "$STUDENT" '.[] | select(.student_code == $s) | .c' raw_creds.json)
          {
            echo "USERNAME=$USERNAME"
            echo "PASSWORD=$PASSWORD"
            echo "CODE=$TWOFA"
          } > .env
          rm raw_creds.json

      - name: 🤖 Run scraper
        env:
          STUDENT_CODE: ${{ github.event.inputs.student_code }}
        run: node scrape.js "$STUDENT_CODE"

      - name: 💾 Commit & push JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update posts for ${{ github.event.inputs.student_code }} [skip ci]"
          file_pattern: "posts/posts-${{ github.event.inputs.student_code }}.json"
          commit_user_name: github-actions
          commit_user_email: actions@github.com

      - name: ⚙️ Configure Pages
        uses: actions/configure-pages@v5

      - name: 📦 Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: 🚀 Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
